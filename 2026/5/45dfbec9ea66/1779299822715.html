
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .splash {
    width: 380px;
    height: 680px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    border-radius: 24px;
  }

  /* Ambient glow blobs */
  .glow-1 {
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120,60,180,0.18) 0%, transparent 70%);
    top: 60px; left: -40px;
    animation: pulse1 4s ease-in-out infinite alternate;
  }
  .glow-2 {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(160,80,220,0.12) 0%, transparent 70%);
    bottom: 100px; right: -20px;
    animation: pulse2 5s ease-in-out infinite alternate;
  }

  @keyframes pulse1 { from { transform: scale(1); opacity: 0.7; } to { transform: scale(1.2); opacity: 1; } }
  @keyframes pulse2 { from { transform: scale(1.1); opacity: 0.6; } to { transform: scale(0.9); opacity: 1; } }

  /* Ring particles */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(150, 80, 200, 0.15);
    animation: expand 3s ease-out forwards;
    opacity: 0;
  }
  .ring-1 { width: 160px; height: 160px; animation-delay: 0.5s; }
  .ring-2 { width: 260px; height: 260px; animation-delay: 0.9s; }
  .ring-3 { width: 360px; height: 360px; animation-delay: 1.3s; }

  @keyframes expand {
    0% { opacity: 0.6; transform: scale(0.6); }
    100% { opacity: 0; transform: scale(1.1); }
  }

  /* Logo container */
  .logo-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: logoReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
    transform: translateY(30px) scale(0.9);
  }
  @keyframes logoReveal {
    0% { opacity: 0; transform: translateY(30px) scale(0.88); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo-icon {
    width: 130px;
    height: 130px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 28px rgba(140, 60, 200, 0.45));
    animation: iconFloat 3.5s ease-in-out infinite;
  }
  @keyframes iconFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .brand-name {
    display: flex;
    align-items: baseline;
    gap: 1px;
  }
  .brand-lo {
    font-size: 42px;
    font-weight: 600;
    color: #b0b0b0;
    letter-spacing: -1px;
    animation: fadeSlideIn 0.8s 0.6s ease both;
    opacity: 0;
  }
  .brand-vina {
    font-size: 42px;
    font-weight: 600;
    color: #9945cc;
    letter-spacing: -1px;
    animation: fadeSlideIn 0.8s 0.8s ease both;
    opacity: 0;
  }
  .brand-group {
    font-size: 15px;
    font-weight: 300;
    color: #888;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 6px;
    animation: fadeSlideIn 0.8s 1.1s ease both;
    opacity: 0;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Separator line */
  .sep {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #7a32b8, transparent);
    margin: 18px 0;
    animation: grow 0.7s 1.3s ease forwards;
  }
  @keyframes grow { to { width: 140px; } }

  /* Tagline */
  .tagline {
    font-size: 11px;
    font-weight: 400;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeSlideIn 0.8s 1.5s ease both;
    opacity: 0;
  }

  /* Loading bar */
  .loader-wrap {
    position: absolute;
    bottom: 60px;
    width: 120px;
    z-index: 10;
    animation: fadeSlideIn 0.6s 1.8s ease both;
    opacity: 0;
  }
  .loader-track {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-fill {
    height: 100%;
    background: linear-gradient(90deg, #5c2090, #9945cc, #bf6ef0);
    border-radius: 2px;
    animation: loadFill 2.2s 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    width: 0;
  }
  @keyframes loadFill { to { width: 100%; } }

  /* Corner dots */
  .dot {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(150, 70, 200, 0.4);
    animation: blink 2s ease-in-out infinite;
  }
  .dot-tl { top: 32px; left: 32px; animation-delay: 0s; }
  .dot-tr { top: 32px; right: 32px; animation-delay: 0.5s; }
  .dot-bl { bottom: 32px; left: 32px; animation-delay: 1s; }
  .dot-br { bottom: 32px; right: 32px; animation-delay: 1.5s; }
  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* Corner brackets */
  .bracket { position: absolute; width: 18px; height: 18px; }
  .bracket-tl { top: 24px; left: 24px; border-top: 1px solid rgba(150,70,200,0.35); border-left: 1px solid rgba(150,70,200,0.35); }
  .bracket-tr { top: 24px; right: 24px; border-top: 1px solid rgba(150,70,200,0.35); border-right: 1px solid rgba(150,70,200,0.35); }
  .bracket-bl { bottom: 24px; left: 24px; border-bottom: 1px solid rgba(150,70,200,0.35); border-left: 1px solid rgba(150,70,200,0.35); }
  .bracket-br { bottom: 24px; right: 24px; border-bottom: 1px solid rgba(150,70,200,0.35); border-right: 1px solid rgba(150,70,200,0.35); }
</style>

<h2 class="sr-only" style="position:absolute;left:-9999px">Lovina Group app splash screen animation</h2>

<div class="splash">
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div class="bracket bracket-tl"></div>
  <div class="bracket bracket-tr"></div>
  <div class="bracket bracket-bl"></div>
  <div class="bracket bracket-br"></div>
  <div class="dot dot-tl"></div>
  <div class="dot dot-tr"></div>
  <div class="dot dot-bl"></div>
  <div class="dot dot-br"></div>

  <div class="logo-wrap">
    <!-- Lovina Group SVG Logo recreation -->
    <svg class="logo-icon" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="purpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#bf6ef0"/>
          <stop offset="100%" stop-color="#6b21a8"/>
        </linearGradient>
        <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e8e8e8"/>
          <stop offset="100%" stop-color="#8a8a8a"/>
        </linearGradient>
      </defs>
      <!-- Outer purple swoosh -->
      <path d="M72 18 C72 18, 108 28, 112 72 C116 108, 90 122, 72 118
               C90 110, 102 90, 96 68 C90 48, 72 42, 72 18 Z"
            fill="url(#purpGrad)" opacity="0.95"/>
      <!-- Inner silver swoosh -->
      <path d="M65 38 C65 38, 88 46, 90 72 C92 92, 78 106, 65 108
               C76 100, 82 86, 80 68 C78 52, 65 46, 65 38 Z"
            fill="url(#silverGrad)" opacity="0.85"/>
      <!-- Top accent swoosh (thin) -->
      <path d="M60 20 C60 20, 42 30, 38 56 C34 78, 50 96, 62 98
               C50 88, 44 70, 50 52 C56 36, 68 28, 60 20 Z"
            fill="url(#purpGrad)" opacity="0.6"/>
    </svg>

    <div class="brand-name">
      <span class="brand-lo">Lo</span><span class="brand-vina">vina</span>
    </div>
    <div class="brand-group">Group</div>
    <div class="sep"></div>
    <div class="tagline">Inspiring excellence</div>
  </div>

  <div class="loader-wrap">
    <div class="loader-track">
      <div class="loader-fill"></div>
    </div>
  </div>
</div>
