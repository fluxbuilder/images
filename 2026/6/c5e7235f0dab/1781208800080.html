<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratnor Splash Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg,
      #0e1d52 0%,
      #1a2f7a 26%,
      #5d4490 46%,
      #c96f3a 64%,
      #f2a953 78%,
      #f7cf8a 100%);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    position: relative;
  }

  /* ---------- Sun ---------- */
  .sun {
    position: absolute;
    left: 72%;
    bottom: 30vh;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff3cc 0%, #ffd27a 50%, rgba(255,180,80,0) 74%);
    filter: blur(2px);
    animation: sunGlow 5s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes sunGlow {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.06); }
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle ease-in-out infinite;
    z-index: 1;
  }
  @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.9} }

  /* ---------- Dunes ---------- */
  .dunes {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    z-index: 2;
    pointer-events: none;
  }

  /* ---------- Top branding ---------- */
  .branding {
    position: absolute;
    top: 6vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 6;
    text-align: center;
  }

  /* ===== LOGO: drops from the sky, bounces, lands ===== */
  .logo-card {
    width: 142px;
    height: 142px;
    background: #ffffff;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow:
      0 18px 42px rgba(14,29,82,.5),
      0 0 0 5px rgba(255,255,255,.22),
      0 0 50px rgba(255,217,138,.35);
    animation: dropFromSky 1.7s cubic-bezier(.36,1.2,.45,1) both;
  }

  .logo-card svg { width: 84%; height: 84%; }

  @keyframes dropFromSky {
    0%   { transform: translateY(-72vh) rotate(-16deg) scale(.6); opacity: 0; }
    6%   { opacity: 1; }
    55%  { transform: translateY(0) rotate(0deg) scale(1); }      /* first touch */
    68%  { transform: translateY(-30px) rotate(2deg) scale(1.04); } /* bounce up */
    80%  { transform: translateY(0) rotate(0deg) scale(.97); }     /* second touch */
    89%  { transform: translateY(-9px) scale(1.01); }              /* tiny bounce */
    100% { transform: translateY(0) scale(1); }
  }

  /* Gold impact flash on landing */
  .impact {
    position: absolute;
    left: 50%;
    bottom: -14px;
    width: 170px;
    height: 26px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,217,138,.95) 0%, rgba(255,180,80,.4) 45%, transparent 72%);
    animation: impactFlash 1.7s ease-out both;
    pointer-events: none;
  }
  @keyframes impactFlash {
    0%, 52% { opacity: 0; transform: translateX(-50%) scaleX(.15); }
    58%     { opacity: 1; transform: translateX(-50%) scaleX(1.5); }
    78%     { opacity: .4; transform: translateX(-50%) scaleX(2.1); }
    100%    { opacity: 0; transform: translateX(-50%) scaleX(2.5); }
  }

  /* Landing sparkles burst */
  .spark {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 7px;
    height: 7px;
    background: #ffd98a;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,217,138,.9);
    opacity: 0;
    animation: sparkBurst 1.7s ease-out both;
    pointer-events: none;
  }
  @keyframes sparkBurst {
    0%, 53% { opacity: 0; transform: translate(0,0) scale(1); }
    58%     { opacity: 1; }
    100%    { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(.2); }
  }

  /* Falling whoosh streaks behind the logo */
  .whoosh {
    position: absolute;
    left: 50%;
    top: -10px;
    width: 3px;
    height: 60px;
    border-radius: 3px;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,.7));
    opacity: 0;
    animation: whooshFall 1.7s ease-in both;
    pointer-events: none;
  }
  @keyframes whooshFall {
    0%   { opacity: 0; transform: translateY(-66vh); }
    10%  { opacity: .8; }
    50%  { opacity: .5; transform: translateY(-8vh); }
    56%  { opacity: 0; transform: translateY(0); }
    100% { opacity: 0; }
  }

  /* ---------- Brand text: appears AFTER landing ---------- */
  .brand-ar {
    font-size: 50px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 20px rgba(14,29,82,.65), 0 0 28px rgba(242,179,92,.4);
    font-family: 'Traditional Arabic', 'Amiri', 'Scheherazade New', serif;
    line-height: 1;
    animation: fadeUp 1s ease 1.55s both;
  }

  .brand-en {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 9px;
    color: #1a2f7a;
    background: #f7d08a;
    padding: 5px 14px 5px 23px;
    border-radius: 24px;
    box-shadow: 0 4px 16px rgba(14,29,82,.35);
    font-family: Georgia, serif;
    animation: fadeUp 1s ease 1.85s both;
  }

  .tagline {
    font-size: 13px;
    color: rgba(255,255,255,.92);
    letter-spacing: 1px;
    text-shadow: 0 1px 8px rgba(14,29,82,.6);
    animation: fadeUp 1s ease 2.1s both;
  }

  @keyframes fadeUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  /* ---------- Rider scene ---------- */
  .rider-scene {
    position: absolute;
    bottom: 9vh;
    left: -480px;
    width: 440px;
    z-index: 4;
    animation: rideAcross 22s linear infinite;
  }
  @keyframes rideAcross {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 960px)); }
  }

  .rider-bob { animation: bob 0.9s ease-in-out infinite; }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  .leg { transform-box: fill-box; transform-origin: top center; }
  .leg-fl { animation: legSwing 0.9s ease-in-out infinite; }
  .leg-bl { animation: legSwing 0.9s ease-in-out infinite; animation-delay: 0.45s; }
  .leg-fr { animation: legSwing2 0.9s ease-in-out infinite; animation-delay: 0.45s; }
  .leg-br { animation: legSwing2 0.9s ease-in-out infinite; }

  @keyframes legSwing {
    0%, 100% { transform: rotate(13deg); }
    50%      { transform: rotate(-13deg); }
  }
  @keyframes legSwing2 {
    0%, 100% { transform: rotate(-13deg); }
    50%      { transform: rotate(13deg); }
  }

  .bag {
    transform-box: fill-box;
    transform-origin: top center;
    animation: bagSwing 0.9s ease-in-out infinite;
  }
  @keyframes bagSwing {
    0%, 100% { transform: rotate(7deg); }
    50%      { transform: rotate(-7deg); }
  }

  .tail {
    transform-box: fill-box;
    transform-origin: top right;
    animation: tailSway 1.8s ease-in-out infinite;
  }
  @keyframes tailSway {
    0%, 100% { transform: rotate(4deg); }
    50%      { transform: rotate(-6deg); }
  }

  .shemagh-tail {
    transform-box: fill-box;
    transform-origin: top center;
    animation: flutter 1.4s ease-in-out infinite;
  }
  @keyframes flutter {
    0%, 100% { transform: rotate(2deg) skewX(1deg); }
    50%      { transform: rotate(-5deg) skewX(-3deg); }
  }

  .dust {
    position: absolute;
    border-radius: 50%;
    background: rgba(222,184,135,.45);
    filter: blur(3px);
    animation: dustPuff 1.2s ease-out infinite;
  }
  @keyframes dustPuff {
    from { transform: scale(.3) translateY(0); opacity: .7; }
    to   { transform: scale(1.6) translateY(-14px) translateX(-22px); opacity: 0; }
  }

  .sand {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,220,160,.5);
    animation: sandDrift linear infinite;
    pointer-events: none;
    z-index: 3;
  }
  @keyframes sandDrift {
    from { transform: translateX(-5vw); opacity: 0; }
    15%  { opacity: .8; }
    85%  { opacity: .35; }
    to   { transform: translateX(108vw) translateY(-28px); opacity: 0; }
  }

  .loader {
    position: absolute;
    bottom: 3.5vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 9px;
    z-index: 6;
    animation: fadeUp 1s ease 2.3s both;
  }
  .loader span {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #1a2f7a;
    box-shadow: 0 0 8px rgba(26,47,122,.5);
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .loader span:nth-child(2) { animation-delay: .18s; }
  .loader span:nth-child(3) { animation-delay: .36s; }
  @keyframes dotBounce {
    0%, 100% { transform: translateY(0); opacity: .4; }
    50%      { transform: translateY(-9px); opacity: 1; }
  }
</style>
