<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Bazolko loading animation">
  <defs>
    <linearGradient id="bazolkoGrad" x1="80" y1="60" x2="430" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="28%" stop-color="#EF4444"/>
      <stop offset="52%" stop-color="#A855F7"/>
      <stop offset="72%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <style>
      .ring{fill:none;stroke:#FF6A00;stroke-width:8;stroke-linecap:round;stroke-dasharray:980;stroke-dashoffset:980;animation:ring 2.4s ease-in-out infinite;transform-origin:256px 236px;}
      .logo{fill:none;stroke:url(#bazolkoGrad);stroke-width:18;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1120;stroke-dashoffset:1120;animation:draw 2.4s ease-in-out infinite, pulse 2.4s ease-in-out infinite;transform-origin:256px 230px;filter:url(#softShadow);}
      .brand{font-family:Inter,Arial,sans-serif;font-weight:700;letter-spacing:8px;font-size:35px;fill:#111827;opacity:0;animation:text 2.4s ease-in-out infinite;}
      .tag{font-family:Inter,Arial,sans-serif;font-weight:500;letter-spacing:1px;font-size:18px;fill:#6B7280;opacity:0;animation:tag 2.4s ease-in-out infinite;}
      @keyframes draw{0%{stroke-dashoffset:1120;opacity:.25}42%,78%{stroke-dashoffset:0;opacity:1}100%{stroke-dashoffset:0;opacity:.25}}
      @keyframes ring{0%{stroke-dashoffset:980;opacity:0;transform:rotate(-90deg) scale(.92)}35%,72%{stroke-dashoffset:0;opacity:.9;transform:rotate(270deg) scale(1)}100%{stroke-dashoffset:980;opacity:0;transform:rotate(630deg) scale(.92)}}
      @keyframes pulse{0%,100%{transform:scale(.92)}45%,78%{transform:scale(1)}}
      @keyframes text{0%,45%{opacity:0;transform:translateY(8px)}58%,84%{opacity:1;transform:translateY(0)}100%{opacity:0}}
      @keyframes tag{0%,55%{opacity:0;transform:translateY(8px)}68%,84%{opacity:1;transform:translateY(0)}100%{opacity:0}}
    </style>
  </defs>
  <rect width="512" height="512" rx="48" fill="#FFFFFF"/>
  <circle class="ring" cx="256" cy="230" r="160"/>
  <path class="logo" d="M149 171 C169 151 211 142 255 150 C321 161 353 205 353 268 L353 337 C353 365 335 381 309 381 C292 381 280 374 274 363 C254 379 230 386 202 381 C160 374 133 344 133 306 C133 260 173 235 236 228 L291 222 L291 204 C291 184 272 172 242 171 C214 170 191 177 167 195 L149 171 Z M291 267 L239 274 C209 278 193 290 193 309 C193 328 211 340 237 336 C265 332 291 313 291 287 Z"/>
  <text class="brand" x="256" y="430" text-anchor="middle">BAZOLKO</text>
  <text class="tag" x="256" y="462" text-anchor="middle">Jo Dikhe Ga Wo Mile Ga</text>
</svg>
